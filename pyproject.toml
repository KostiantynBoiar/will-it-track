# Tooling config only (ruff format + lint). This is NOT a packaging manifest —
# the project is run from the repo root (see conftest.py), not pip-installed.

[tool.ruff]
line-length = 100
target-version = "py311"
# Don't lint vendored/third-party code (e.g. SAM 2/3 + veval under third_party/).
extend-exclude = ["**/evaluation", "third_party"]

[tool.ruff.lint]
# E/F: pyflakes + pycodestyle, I: import sorting, UP: pyupgrade, B: bugbear.
select = ["E", "F", "I", "UP", "B"]
ignore = ["E501"]  # line length is enforced by the formatter, not the linter

[tool.ruff.lint.isort]
# The `src` package lives at the repo root (on sys.path via conftest) — first-party.
known-first-party = ["src"]

[tool.ruff.lint.pydocstyle]
convention = "google"
